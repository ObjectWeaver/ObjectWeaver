syntax = "proto3";

package jsonSchema;

option go_package = "./grpc";

import "google/protobuf/struct.proto";

// Definition message
message Definition {
  string type = 1;
  string instruction = 2;
  map<string, Definition> properties = 3;
  Definition items = 4;
  string model = 5;
  repeated string processingOrder = 6;
  string systemPrompt = 7;
  HashMap hashMap = 8;
  TextToSpeech textToSpeech = 9;
  SpeechToText speechToText = 10;
  Image image = 11;
  RequestFormat req = 12;
  Focus narrowFocus = 13;
  repeated string selectFields = 14;
  SendImage sendImage = 15;
  bool stream = 16;
  string overridePrompt = 17;
  int32 priority = 18;
  DecisionPoint decisionPoint = 19;
  ScoringCriteria scoringCriteria = 20;
  RecursiveLoop recursiveLoop = 21;
  EpistemicValidation epistemic = 22;
  ModelConfig modelConfig = 23;
}

// Condition message
message Condition {
  string field = 1;
  string operator = 2;
  oneof value {
    double number_value = 3;
    string string_value = 4;
    bool bool_value = 5;
  }
  string fieldPath = 6;
}

// ConditionalBranch message
message ConditionalBranch {
  string name = 1;
  repeated Condition conditions = 2;
  Definition logic = 3;
  Definition then = 4;
  int32 priority = 5;
}

// DecisionPoint message
message DecisionPoint {
  string name = 1;
  string evaluationPrompt = 2;
  repeated ConditionalBranch branches = 3;
  string strategy = 4;
}

// EpistemicValidation message
message EpistemicValidation {
  bool active = 1;
  int32 judges = 2;
}

// Focus message
message Focus {
  string prompt = 1;
  repeated string fields = 2;
  bool keepOriginal = 3;
}

// HashMap message
message HashMap {
  string keyInstruction = 1;
  Definition fieldDefinition = 2;
}

// Image message
message Image {
  string model = 1;
  string size = 2;
}

// ModelConfig message
message ModelConfig {
  int32 maxCompletionTokens = 1;
  float temperature = 2;
  float topP = 3;
  int32 n = 4;
  bool stream = 5;
  repeated string stop = 6;
  float presencePenalty = 7;
  int32 seed = 8;
  float frequencyPenalty = 9;
  map<string, int32> logitBias = 10;
  bool logProbs = 11;
  int32 topLogProbs = 12;
  string user = 13;
  bool store = 14;
  string reasoningEffort = 15;
  map<string, string> metadata = 16;
  google.protobuf.Struct chatTemplateKwargs = 17;
}

// RecursiveLoop message
message RecursiveLoop {
  int32 maxIterations = 1;
  string selection = 2;
  DecisionPoint terminationPoint = 3;
  string feedbackPrompt = 4;
  bool includePreviousAttempts = 5;
}

// RequestBody message
message RequestBody {
  string prompt = 1;
  Definition definition = 2;
}

// RequestFormat message
message RequestFormat {
  string url = 1;
  string method = 2;
  map<string, string> headers = 3;
  google.protobuf.Struct body = 4;
  string authorization = 5;
  repeated string requireFields = 6;
}

// Response message
message Response {
  google.protobuf.Struct data = 1;
  double usdCost = 2;
  map<string, DetailedField> detailedData = 3;
}

// ScoreScale message
message ScoreScale {
  int32 min = 1;
  int32 max = 2;
}

// ScoringCriteria message
message ScoringCriteria {
  map<string, ScoringDimension> dimensions = 1;
  string evaluationModel = 2;
  string aggregationMethod = 3;
}

// ScoringDimension message
message ScoringDimension {
  string description = 1;
  ScoreScale scale = 2;
  string type = 3;
  double weight = 4;
}

// SendImage message
message SendImage {
  repeated bytes imagesData = 1;
}

// SpeechToText message
message SpeechToText {
  string model = 1;
  bytes audioToTranscribe = 2;
  string language = 3;
  string format = 4;
  bool toString = 5;
  bool toCaptions = 6;
  string chunkingStrategy = 7;
  google.protobuf.Struct extraBody = 8;
}

// SubordinateFunction message
message SubordinateFunction {
  string name = 1;
  Definition definition = 2;
}

// TextToSpeech message
message TextToSpeech {
  string model = 1;
  string stringToAudio = 2;
  string voice = 3;
  string format = 4;
}

// Choice message for epistemic validation results
message Choice {
  int32 score = 1;
  double confidence = 2;
  google.protobuf.Struct value = 3;
  repeated double embedding = 4;
}

// FieldMetadata contains metadata for a single field
message FieldMetadata {
  int32 tokensUsed = 1;
  double cost = 2;
  string modelUsed = 3;
  repeated Choice choices = 4;
}

// DetailedField contains both the value and metadata for a field
message DetailedField {
  google.protobuf.Struct value = 1;
  FieldMetadata metadata = 2;
}

// StreamingResponse message for the stream method
message StreamingResponse {
  google.protobuf.Struct data = 1;
  double usdCost = 2;
  string status = 3;
  map<string, DetailedField> detailedData = 4;
}

// The JSONSchemaService defines a service for generating JSON objects based on a schema definition.
service JSONSchemaService {
  // Standard request-response RPC
  rpc GenerateObject(RequestBody) returns (Response);

  // Server-side streaming RPC
  rpc StreamGeneratedObjects(RequestBody) returns (stream StreamingResponse);
}
