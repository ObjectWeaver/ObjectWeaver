name: Go Coverage Badge

on:
  push:
    branches: [ main ]

jobs:
  coverage:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.25'

      - name: Cache Go modules
        uses: actions/cache@v3
        with:
          path: ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Run tests with coverage
        run: |
          # Run tests excluding auto-generated gRPC files
          go test $(go list ./... | grep -v '/grpc$') -coverprofile=coverage.out -covermode=atomic

      - name: Calculate and update coverage badge
        run: |
          # Calculate total coverage
          total_coverage=$(go tool cover -func=coverage.out | grep total | awk '{print substr($3, 1, length($3)-1)}')
          echo "Total coverage: ${total_coverage}%"
          
          # Determine badge color
          coverage_int=$(echo "$total_coverage" | cut -d. -f1)
          if [ "$coverage_int" -ge 80 ]; then
            color="brightgreen"
          elif [ "$coverage_int" -ge 50 ]; then
            color="yellow"  
          else
            color="red"
          fi
          
          # Update README using perl (more reliable for special chars)
          perl -i -pe "s|!\[Coverage\]\(https://img\.shields\.io/badge/Coverage-[^)]+\)|![Coverage](https://img.shields.io/badge/Coverage-${total_coverage}%25-${color})|g" README.md
          
          echo "Updated badge to show ${total_coverage}% in ${color}"

      - name: Verify Changed files
        uses: tj-actions/verify-changed-files@v17
        id: verify-changed-files
        with:
          files: README.md

      - name: Commit changes
        if: steps.verify-changed-files.outputs.files_changed == 'true'
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add README.md
          git commit -m "chore: Updated coverage badge"

      - name: Push changes
        if: steps.verify-changed-files.outputs.files_changed == 'true'
        uses: ad-m/github-push-action@master
        with:
          github_token: ${{ github.token }}
          branch: ${{ github.ref }}
