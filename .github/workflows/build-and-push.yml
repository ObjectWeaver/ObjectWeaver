name: Docker Build and Push

on:
  # Triggers the workflow on push events but only for the "main" branch
  push:
    branches:
      - main
  # Also runs on pull requests, but will not push the image
  pull_request:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    
    # PERMISSIONS: This explicitly grants the GITHUB_TOKEN power to push tags
    permissions:
      contents: write
      pull-requests: write
      actions: write
      packages: write

    steps:
      # Step 1: Check out the repository's code
      # We use the ADMIN_TOKEN here to ensure the repo is cloned with your permissions
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true
          token: ${{ secrets.ADMIN_TOKEN }}

      # Ensure all tags are fetched (belt and suspenders)
      - name: Fetch all tags
        run: git fetch --tags --force

      # Step 1.5: Set up Go
      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.25'

      # Step 2: Determine the next version number - only on main
      - name: Calculate next version
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        id: tag_version
        run: |
          # Get the latest tag that matches semantic versioning pattern
          LATEST_TAG=$(git tag -l 'v*.*.*' | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | sort -V | tail -1)
          
          if [ -z "$LATEST_TAG" ]; then
            # No valid tags found, start at v1.0.0
            NEW_TAG="v1.0.0"
          else
            # Parse the version components
            VERSION=${LATEST_TAG#v}
            MAJOR=$(echo $VERSION | cut -d. -f1)
            MINOR=$(echo $VERSION | cut -d. -f2)
            PATCH=$(echo $VERSION | cut -d. -f3)
            
            # Increment patch version
            NEW_PATCH=$((PATCH + 1))
            NEW_TAG="v${MAJOR}.${MINOR}.${NEW_PATCH}"
          fi
          
          echo "Latest tag: $LATEST_TAG"
          echo "New tag: $NEW_TAG"
          echo "new_tag=${NEW_TAG}" >> $GITHUB_OUTPUT

      - name: Push Tag via API
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          NEW_TAG="${{ steps.tag_version.outputs.new_tag }}"
          echo "Attempting to create tag $NEW_TAG via API..."
          
          # Check if tag already exists
          EXISTING=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/${{ github.repository }}/git/refs/tags/$NEW_TAG)
          
          if [ "$EXISTING" = "200" ]; then
            echo "Tag $NEW_TAG already exists, skipping creation"
          else
            curl -X POST \
              -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
              -H "Accept: application/vnd.github.v3+json" \
              https://api.github.com/repos/${{ github.repository }}/git/refs \
              -d "{
                \"ref\": \"refs/tags/$NEW_TAG\",
                \"sha\": \"${{ github.sha }}\"
              }"
          fi

      # Step 3: Prepare Docker tags - only on main
      - name: Prepare Docker tags
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        id: prep_tags
        run: |
          FULL_VERSION=${{ steps.tag_version.outputs.new_tag }}
          MAJOR_MINOR="v$(echo ${FULL_VERSION#v} | cut -d. -f1,2)"
          echo "full_version=${FULL_VERSION}" >> $GITHUB_OUTPUT
          echo "major_minor=${MAJOR_MINOR}" >> $GITHUB_OUTPUT

      # Step 4: Set up Docker Buildx
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Step 5: Set up QEMU
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      # Step 6: Login to Docker Hub - only on main
      - name: Login to DockerHub
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Step 7: Extract Docker metadata - only on main
      - name: Extract Docker metadata
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: objectweaver/objectweaver
          tags: |
            type=raw,value=${{ steps.prep_tags.outputs.full_version }}
            type=raw,value=${{ steps.prep_tags.outputs.major_minor }}
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      # Step 8: Build Docker image (PR only - just verify it builds)
      - name: Build Docker image (PR validation)
        if: github.event_name == 'pull_request'
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          platforms: linux/amd64

      # Step 9: Build and push Docker image (main only)
      - name: Build and push Docker image with SBOM and provenance
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          sbom: true
          provenance: mode=max
          platforms: linux/amd64, linux/arm64, linux/ppc64le, linux/s390x, linux/386, linux/arm/v7, linux/arm/v6

      # Step 10: Print new tag - only on main
      - name: Print new tag
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: echo "The new tag is ${{ steps.tag_version.outputs.new_tag }}"