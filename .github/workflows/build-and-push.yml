# This workflow name
name: Docker Build and Push

# Controls when the workflow will run
on:
  # Triggers the workflow on push events but only for the "main" branch
  push:
    branches:
      - main
  # Also runs on pull requests, but will not push the image
  pull_request:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      # Step 1: Check out the repository's code
      # We set fetch-depth: 0 to fetch all history and tags.
      # This is required for the versioning action to find the previous tag.
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Step 1.5: Set up Go and run tests
      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.25'

      - name: Cache Go modules
        uses: actions/cache@v3
        with:
          path: ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Run tests
        run: go test ./... -coverprofile=coverage.out

      - name: Generate coverage report
        run: go tool cover -func=coverage.out | grep total

      # Step 2: Determine the next version number
      # This action finds the latest Git tag that looks like a version number,
      # increments the patch number, and creates a new Git tag.
      - name: Get next version
        id: tag_version
        uses: anothrNick/github-tag-action@1.67.0
        env:
          GITHUB_TOKEN: ${{ secrets.REPO_TOKEN }}
          WITH_V: true # This will prefix the tag with 'v' (e.g., v1.0.1)
          DEFAULT_BUMP: patch # Increments the last part of the version
          INITIAL_VERSION: 1.0.0 # Start with 1.0.0 if no other valid tags are found

      # Step 3: Prepare Docker tags
      # This step manually creates the tag strings to avoid complex parsing later.
      - name: Prepare Docker tags
        id: prep_tags
        run: |
          FULL_VERSION=${{ steps.tag_version.outputs.new_tag }}
          # Strip the 'v' prefix, cut the first two parts (major.minor), then add 'v' back.
          MAJOR_MINOR="v$(echo ${FULL_VERSION#v} | cut -d. -f1,2)"
          echo "full_version=${FULL_VERSION}" >> $GITHUB_OUTPUT
          echo "major_minor=${MAJOR_MINOR}" >> $GITHUB_OUTPUT

      # Step 4: Set up Docker Buildx
      # This is a required step for building multi-platform images.
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Step 5: Set up QEMU for multi-platform builds
      # This allows you to build images for different architectures like ARM.
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      # Step 6: Login to Docker Hub
      # Uses your secrets to securely log in to your container registry.
      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Step 7: Extract Docker metadata (tags and labels)
      # We use the simple text strings prepared in the previous step.
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: henrylamb/objectweaver
          tags: |
            type=raw,value=${{ steps.prep_tags.outputs.full_version }}
            type=raw,value=${{ steps.prep_tags.outputs.major_minor }}
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      # Step 8: Build and push Docker image
      # This step now uses the dynamic tags generated by the metadata action.
      # The 'push' parameter is conditional: it only pushes if the event is a push
      # to the main branch, not during a pull request.
      - name: Build and push Docker image with SBOM and provenance
        uses: docker/build-push-action@v6
        with:
          context: .
          # Only push the image on merges to the main branch
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          sbom: true
          provenance: mode=max
          platforms: linux/amd64, linux/arm64, linux/ppc64le, linux/s390x, linux/386, linux/arm/v7, linux/arm/v6

      # (Optional) Step 9: Output the new tag for verification
      - name: Print new tag
        run: echo "The new tag is ${{ steps.tag_version.outputs.new_tag }}"
