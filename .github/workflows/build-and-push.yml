name: Docker Build and Push

on:
  # Triggers the workflow on push events but only for the "main" branch
  push:
    branches:
      - main
  # Also runs on pull requests, but will not push the image
  pull_request:
  # Manual trigger for testing
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (skip tag creation and docker push)'
        required: false
        default: 'false'
        type: boolean

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    
    # PERMISSIONS: This explicitly grants the GITHUB_TOKEN power to push tags
    permissions:
      contents: write
      pull-requests: write
      actions: write
      packages: write

    steps:
      # Step 1: Check out the repository's code
      # We use the ADMIN_TOKEN here to ensure the repo is cloned with your permissions
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true
          token: ${{ secrets.ADMIN_TOKEN }}

      # Ensure all tags are fetched (belt and suspenders)
      - name: Fetch all tags
        run: git fetch --tags --force

      # Step 1.5: Set up Go
      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.25'

      # Step 2: Bump version and push tag - only on main (or manual trigger)
      - name: Bump version and push tag
        if: (github.event_name == 'push' && github.ref == 'refs/heads/main') || github.event_name == 'workflow_dispatch'
        id: tag_version
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.ADMIN_TOKEN }}
          default_bump: patch
          tag_prefix: v
          create_annotated_tag: true
          # Dry run mode - don't actually create the tag
          dry_run: ${{ inputs.dry_run || false }}

      # Step 3: Prepare Docker tags - only on main (or manual non-dry-run)
      - name: Prepare Docker tags
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        id: prep_tags
        run: |
          FULL_VERSION=${{ steps.tag_version.outputs.new_tag }}
          echo "full_version=${FULL_VERSION}" >> $GITHUB_OUTPUT

      # Step 4: Set up Docker Buildx
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Step 5: Set up QEMU
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      # Step 6: Login to Docker Hub - only on main
      - name: Login to DockerHub
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Step 7: Extract Docker metadata - only on main
      - name: Extract Docker metadata
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: objectweaver/objectweaver
          tags: |
            type=raw,value=${{ steps.prep_tags.outputs.full_version }}
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      # Step 8: Build Docker image (PR only - just verify it builds)
      - name: Build Docker image (PR validation)
        if: github.event_name == 'pull_request'
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          platforms: linux/amd64

      # Step 9: Build and push Docker image (main only)
      - name: Build and push Docker image with SBOM and provenance
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          sbom: true
          provenance: mode=max
          platforms: linux/amd64, linux/arm64, linux/ppc64le, linux/s390x, linux/386, linux/arm/v7, linux/arm/v6

      # Step 10: Print new tag - only on main
      - name: Print new tag
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: echo "The new tag is ${{ steps.tag_version.outputs.new_tag }}"